# Tests/Controller/App/config.yml
framework:
    test: true
    secret: 'test'
    router:
        utf8: true
    http_method_override: false
doctrine:
    dbal:
        memory: true
    orm:
        enable_native_lazy_objects: true
        controller_resolver:
            auto_mapping: false
services:
    Evotodi\SeedBundle\Tests\fixtures\:
        resource: '../fixtures/*'
        tags:
            - { name: 'console.command' }
            - { name: 'seed.seed' }
